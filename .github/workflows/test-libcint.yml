name: test-libcint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # this test also checks feature bse
  test-build-dynamic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install basis_set_exchange
        run: pip install basis_set_exchange
      - name: test crate libcint
        run: |
          cd libcint
          cargo test --features="build_from_source"

  test-custom-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: build libcint.so
        run: |
          cd ~
          git clone https://github.com/sunqm/libcint.git
          cd libcint
          mkdir build; cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=/usr
          make -j4
          sudo make install

      - name: test crate libcint
        run: |
          cd libcint
          cargo test --no-default-features

  test-build-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: test crate libcint
        run: |
          cd libcint
          cargo test --no-default-features --features="build_from_source static"

  test-build-static-qcint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: test crate libcint
        run: |
          cd libcint
          cargo test --no-default-features --features="build_from_source static qcint"
